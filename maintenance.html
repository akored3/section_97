<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SECTION-97 // OFFLINE FOR MAINTENANCE</title>
    <meta name="description" content="SECTION-97 is briefly offline for maintenance. We'll be back soon.">
    <meta name="robots" content="noindex">

    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net; style-src 'self' 'unsafe-inline'; font-src 'self'; connect-src 'self' https://*.supabase.co; img-src 'self' data:; frame-ancestors 'none';">
    <meta http-equiv="X-Content-Type-Options" content="nosniff">
    <meta name="referrer" content="strict-origin-when-cross-origin">

    <link rel="icon" href="favicon.ico">
    <link rel="preload" href="fonts/chakra-petch-700.woff2" as="font" type="font/woff2" crossorigin>
    <link rel="preload" href="fonts/space-mono-400.woff2"  as="font" type="font/woff2" crossorigin>

    <script src="/js/vendor/sentry.bundle.min.js"></script>
    <script src="js/config/sentry.js"></script>

    <style>
        @font-face { font-family: 'Chakra Petch'; src: url('fonts/chakra-petch-400.woff2') format('woff2'); font-weight: 400; font-display: block; }
        @font-face { font-family: 'Chakra Petch'; src: url('fonts/chakra-petch-700.woff2') format('woff2'); font-weight: 700; font-display: block; }
        @font-face { font-family: 'Space Mono';  src: url('fonts/space-mono-400.woff2')  format('woff2'); font-weight: 400; font-display: block; }

        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --m-accent: #00ff64;
            --m-accent-dim: #009940;
            --m-bg: #06060a;
            --m-fg1: #f0f0f0;
            --m-fg2: #888888;
            --m-fg3: #444444;
            --m-error: #ff6b35;
            --m-display: 'Chakra Petch', 'Orbitron', sans-serif;
            --m-mono: 'Space Mono', 'Share Tech Mono', monospace;
        }

        html, body { height: 100%; }
        body {
            background: var(--m-bg);
            color: var(--m-fg1);
            font-family: var(--m-mono);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 32px 20px;
            overflow: hidden;
            position: relative;
        }

        /* Film grain — same data URI as landing page so the texture matches */
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            pointer-events: none;
            z-index: 9999;
            opacity: 0.04;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
        }

        /* Green scanlines */
        body::after {
            content: '';
            position: fixed;
            inset: 0;
            pointer-events: none;
            z-index: 9998;
            background: repeating-linear-gradient(0deg, transparent 0px, transparent 3px, rgba(0,255,100,0.018) 4px, transparent 5px);
        }

        /* Soft accent glow behind the panel */
        .glow {
            position: fixed;
            inset: 0;
            pointer-events: none;
            z-index: 0;
            background: radial-gradient(ellipse 60% 70% at 50% 50%, rgba(0,255,100,0.08) 0%, transparent 70%);
        }

        .stage {
            position: relative;
            z-index: 1;
            width: 100%;
            max-width: 560px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 32px;
        }

        /* Brand header */
        .brand {
            font-family: var(--m-display);
            font-weight: 700;
            font-size: clamp(28px, 5vw, 40px);
            letter-spacing: 4px;
            color: #fff;
            text-transform: uppercase;
        }
        .brand .accent { color: var(--m-accent); }
        .brand .caret {
            display: inline-block;
            width: 0.55em;
            margin-left: 2px;
            color: var(--m-accent);
            animation: m-blink 1s steps(1) infinite;
        }
        @keyframes m-blink { 0%, 49% { opacity: 1; } 50%, 100% { opacity: 0; } }

        /* Status panel with corner brackets */
        .panel {
            position: relative;
            width: 100%;
            border: 1px solid rgba(0, 255, 100, 0.3);
            background: rgba(0, 255, 100, 0.04);
            padding: 24px 22px 22px;
            box-shadow: 0 0 40px rgba(0, 255, 100, 0.06), 0 16px 48px rgba(0, 0, 0, 0.45);
        }
        .panel::before {
            content: '';
            position: absolute;
            top: -1px; left: 0; right: 0;
            height: 1px;
            background: linear-gradient(90deg, transparent, rgba(0, 255, 100, 0.7), transparent);
        }
        .bracket { position: absolute; width: 14px; height: 14px; }
        .bracket.tl { top: -1px; left: -1px;  border-top: 2px solid var(--m-accent);  border-left: 2px solid var(--m-accent); }
        .bracket.tr { top: -1px; right: -1px; border-top: 2px solid var(--m-accent);  border-right: 2px solid var(--m-accent); }
        .bracket.bl { bottom: -1px; left: -1px;  border-bottom: 2px solid var(--m-accent); border-left: 2px solid var(--m-accent); }
        .bracket.br { bottom: -1px; right: -1px; border-bottom: 2px solid var(--m-accent); border-right: 2px solid var(--m-accent); }

        .panel-tag {
            font-size: 10px;
            letter-spacing: 3px;
            color: var(--m-accent);
            text-transform: uppercase;
            margin-bottom: 18px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .panel-tag::before {
            content: '';
            width: 7px;
            height: 7px;
            background: var(--m-accent);
            box-shadow: 0 0 8px var(--m-accent);
            animation: m-blink 1s steps(1) infinite;
        }

        .status-line {
            display: flex;
            align-items: center;
            gap: 12px;
            font-size: 13px;
            line-height: 1.5;
            color: var(--m-fg1);
            text-transform: uppercase;
            letter-spacing: 1.5px;
            padding: 6px 0;
        }
        .status-line + .status-line { border-top: 1px solid rgba(255, 255, 255, 0.04); }
        .status-line .glyph { color: var(--m-accent); width: 14px; flex-shrink: 0; text-align: center; }
        .status-line.warn .glyph { color: var(--m-error); }
        .status-line .text { color: var(--m-fg2); }
        .status-line.warn .text { color: var(--m-fg1); }

        /* Looping progress bar — proves the page is alive */
        .progress {
            margin-top: 22px;
        }
        .progress-labels {
            display: flex;
            justify-content: space-between;
            font-size: 9px;
            letter-spacing: 2px;
            color: var(--m-fg3);
            text-transform: uppercase;
            margin-bottom: 7px;
        }
        .progress-labels .right { color: var(--m-accent); }
        .progress-track {
            height: 5px;
            background: rgba(255, 255, 255, 0.06);
            overflow: hidden;
            position: relative;
        }
        .progress-fill {
            position: absolute;
            top: 0; left: 0; bottom: 0;
            width: 30%;
            background: linear-gradient(90deg, var(--m-accent-dim), var(--m-accent));
            box-shadow: 0 0 12px rgba(0, 255, 100, 0.6);
            animation: m-loop 2.6s cubic-bezier(0.4, 0, 0.2, 1) infinite;
        }
        @keyframes m-loop {
            0%   { left: -30%; width: 30%; }
            50%  { left: 35%;  width: 50%; }
            100% { left: 100%; width: 30%; }
        }

        .footnote {
            font-size: 9px;
            letter-spacing: 2.5px;
            color: var(--m-fg3);
            text-transform: uppercase;
            text-align: center;
        }

        @media (max-width: 480px) {
            .brand { font-size: 26px; letter-spacing: 3px; }
            .panel { padding: 20px 18px; }
            .status-line { font-size: 12px; letter-spacing: 1px; }
        }

        /* Honour the OS reduced-motion preference for everyone else's vestibular sake */
        @media (prefers-reduced-motion: reduce) {
            *, *::before, *::after {
                animation-duration: 0.01ms !important;
                animation-iteration-count: 1 !important;
            }
            .progress-fill { left: 0; width: 100%; }
        }
    </style>
</head>
<body>
    <div class="glow" aria-hidden="true"></div>

    <main class="stage" role="main" aria-label="Maintenance notice">
        <h1 class="brand">SECTION<span class="accent">-97</span><span class="caret" aria-hidden="true">_</span></h1>

        <section class="panel" aria-labelledby="panel-tag">
            <span class="bracket tl" aria-hidden="true"></span>
            <span class="bracket tr" aria-hidden="true"></span>
            <span class="bracket bl" aria-hidden="true"></span>
            <span class="bracket br" aria-hidden="true"></span>

            <div id="panel-tag" class="panel-tag">SYSTEM STATUS</div>

            <div class="status-line warn">
                <span class="glyph" aria-hidden="true">●</span>
                <span class="text">OFFLINE FOR MAINTENANCE</span>
            </div>
            <div class="status-line">
                <span class="glyph" aria-hidden="true">▶</span>
                <span class="text">Updating product catalog</span>
            </div>
            <div class="status-line">
                <span class="glyph" aria-hidden="true">▶</span>
                <span class="text">Re-encoding images (WebP)</span>
            </div>
            <div class="status-line">
                <span class="glyph" aria-hidden="true">▶</span>
                <span class="text">Back online soon</span>
            </div>

            <div class="progress" aria-hidden="true">
                <div class="progress-labels">
                    <span>WORKING ON IT</span>
                    <span class="right">STAY METAL</span>
                </div>
                <div class="progress-track">
                    <div class="progress-fill"></div>
                </div>
            </div>
        </section>

        <p class="footnote">// METALBEARD · STAY METAL</p>
    </main>
</body>
</html>
