<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SECTION-97 | Join the Community</title>
    <meta name="description" content="Join SECTION-97 - the streetwear community. Sign up or log in to start shopping.">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;700&family=Share+Tech+Mono&family=Rajdhani:wght@400;500;600;700&display=swap" rel="stylesheet">
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src https://fonts.gstatic.com; connect-src 'self' https://*.supabase.co; img-src 'self' data: https:; frame-ancestors 'none';">
    <meta http-equiv="X-Content-Type-Options" content="nosniff">
    <meta name="referrer" content="strict-origin-when-cross-origin">
    <meta http-equiv="Permissions-Policy" content="camera=(), microphone=(), geolocation=(), payment=()">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <script>
        // Apply saved theme immediately to prevent flash
        const savedTheme = localStorage.getItem('theme') || 'dark';
        document.documentElement.setAttribute('data-theme', savedTheme);

        document.addEventListener('DOMContentLoaded', () => {
            // Theme toggle
            const themeToggle = document.getElementById('theme-toggle');
            const svg = themeToggle.querySelector('svg');

            function updateIcon(theme) {
                if (theme === 'dark') {
                    svg.innerHTML = `
                        <circle cx="12" cy="12" r="5"></circle>
                        <line x1="12" y1="1" x2="12" y2="3"></line>
                        <line x1="12" y1="21" x2="12" y2="23"></line>
                        <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line>
                        <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line>
                        <line x1="1" y1="12" x2="3" y2="12"></line>
                        <line x1="21" y1="12" x2="23" y2="12"></line>
                        <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line>
                        <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line>
                    `;
                } else {
                    svg.innerHTML = '<path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>';
                }
            }

            updateIcon(savedTheme);

            themeToggle.addEventListener('click', () => {
                const current = document.documentElement.getAttribute('data-theme');
                const newTheme = current === 'light' ? 'dark' : 'light';
                document.documentElement.setAttribute('data-theme', newTheme);
                localStorage.setItem('theme', newTheme);
                updateIcon(newTheme);
            });

            // Auth background element (parallax removed)
        });
    </script>

    <!-- Background images with parallax -->
    <div id="auth-bg" class="auth-bg"></div>

    <!-- Floating particles -->
    <div class="particles">
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
    </div>

    <div class="auth-container">
        <!-- Theme Toggle -->
        <button id="theme-toggle" class="theme-toggle" aria-label="Toggle theme">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>
            </svg>
        </button>

        <a href="index.html" class="back-link">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="18" height="18">
                <path d="M19 12H5M12 19l-7-7 7-7"/>
            </svg>
            Back to Store
        </a>

        <div class="auth-card">
            <div class="auth-card-inner">
                <!-- Corner brackets -->
                <div class="hud-bracket hud-bracket-tl"></div>
                <div class="hud-bracket hud-bracket-tr"></div>
                <div class="hud-bracket hud-bracket-bl"></div>
                <div class="hud-bracket hud-bracket-br"></div>
                <!-- Scanlines overlay -->
                <div class="auth-scanlines"></div>
                <!-- Scan beam -->
                <div class="auth-scan-beam"></div>

                <!-- Logo with glitch -->
                <div class="auth-logo">
                    <h1>SECTION-97<span class="cursor">|</span></h1>
                    <p>Join the community</p>
                </div>

                <!-- Tabs -->
                <div class="auth-tabs">
                    <button class="auth-tab active" data-tab="login">LOG IN</button>
                    <button class="auth-tab" data-tab="signup">SIGN UP</button>
                </div>

                <div id="auth-message" class="auth-message" role="alert" aria-live="polite"></div>

                <!-- Auth loader (shown during login/signup) -->
                <div id="auth-loader" class="s97-loader hidden">
                    <div class="s97-progress">
                        <div class="s97-progress__header">
                            <span class="s97-progress__label">AUTHENTICATING</span>
                            <span class="s97-progress__percent">0%</span>
                        </div>
                        <div class="s97-progress__track">
                            <div class="corner-bracket corner-bracket--tl"></div>
                            <div class="corner-bracket corner-bracket--tr"></div>
                            <div class="corner-bracket corner-bracket--bl"></div>
                            <div class="corner-bracket corner-bracket--br"></div>
                            <div class="s97-progress__fill"></div>
                        </div>
                        <div class="s97-progress__ticks">
                            <div class="s97-progress__tick" data-tick="0"><div class="s97-progress__tick-mark"></div><span class="s97-progress__tick-label">0</span></div>
                            <div class="s97-progress__tick" data-tick="25"><div class="s97-progress__tick-mark"></div><span class="s97-progress__tick-label">25</span></div>
                            <div class="s97-progress__tick" data-tick="50"><div class="s97-progress__tick-mark"></div><span class="s97-progress__tick-label">50</span></div>
                            <div class="s97-progress__tick" data-tick="75"><div class="s97-progress__tick-mark"></div><span class="s97-progress__tick-label">75</span></div>
                            <div class="s97-progress__tick" data-tick="100"><div class="s97-progress__tick-mark"></div><span class="s97-progress__tick-label">100</span></div>
                        </div>
                        <div class="s97-progress__status">
                            <div class="s97-progress__indicators">
                                <div class="s97-progress__indicator" data-at="15"><div class="s97-progress__indicator-dot"></div><span class="s97-progress__indicator-label">SYS</span></div>
                                <div class="s97-progress__indicator" data-at="30"><div class="s97-progress__indicator-dot"></div><span class="s97-progress__indicator-label">NET</span></div>
                                <div class="s97-progress__indicator" data-at="50"><div class="s97-progress__indicator-dot"></div><span class="s97-progress__indicator-label">GFX</span></div>
                                <div class="s97-progress__indicator" data-at="70"><div class="s97-progress__indicator-dot"></div><span class="s97-progress__indicator-label">HUD</span></div>
                                <div class="s97-progress__indicator" data-at="90"><div class="s97-progress__indicator-dot"></div><span class="s97-progress__indicator-label">RDY</span></div>
                            </div>
                            <span class="s97-progress__state">LOADING</span>
                        </div>
                    </div>
                </div>

                <!-- Login Form -->
                <form id="login-form" class="auth-form">
                    <div class="form-group">
                        <label for="login-email">EMAIL</label>
                        <input type="email" id="login-email" required placeholder="your@email.com">
                    </div>
                    <div class="form-group">
                        <label for="login-password">PASSWORD</label>
                        <input type="password" id="login-password" required placeholder="enter your password">
                        <a href="#" class="forgot-link">FORGOT PASSWORD?</a>
                    </div>
                    <button type="submit" class="auth-submit">LOG IN</button>
                </form>

                <!-- Signup Form -->
                <form id="signup-form" class="auth-form hidden">
                    <div class="form-group">
                        <label for="signup-email">EMAIL</label>
                        <input type="email" id="signup-email" required placeholder="your@email.com">
                    </div>
                    <div class="form-group">
                        <label for="signup-password">PASSWORD</label>
                        <input type="password" id="signup-password" required placeholder="enter your password">
                    </div>
                    <div class="form-group">
                        <label for="signup-confirm">CONFIRM PASSWORD</label>
                        <input type="password" id="signup-confirm" required placeholder="re-enter password">
                    </div>
                    <button type="submit" class="auth-submit">CREATE ACCOUNT</button>
                </form>

                <!-- Divider -->
                <div class="auth-divider">
                    <span>OR</span>
                </div>

                <!-- Guest button -->
                <a href="index.html" class="auth-guest-btn">CONTINUE AS GUEST</a>

                <!-- Auth mode indicator -->
                <div class="auth-mode-bar">
                    <span>AUTH_MODE: <span id="auth-mode-text">LOGIN</span></span>
                    <span><span class="encrypted-dots">●●●</span> ENCRYPTED</span>
                </div>
            </div>

            <!-- Accent line beneath card -->
            <div class="auth-accent-line"></div>
        </div>

        <!-- Page footer -->
        <div class="auth-page-footer">
            SECTION-97 // SECURE ACCESS // 2026
        </div>
    </div>

    <!-- Supabase Client Library -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.95.2/dist/umd/supabase.min.js" integrity="sha384-O3Y0txdelyzhAPieX5MdbO1gTZ6zC6OPZWkeMpKKWrLqkDY+aR7MIcVR5oxNfmo3" crossorigin="anonymous"></script>
    <script type="module">
        import { signIn, signUp, getCurrentUser } from './js/auth/auth.js';
        import { startS97Progress } from './js/ui/progressBar.js';

        // Check if already logged in
        getCurrentUser().then(user => {
            if (user) {
                window.location.href = 'index.html';
            }
        });

        // Tab switching
        const tabs = document.querySelectorAll('.auth-tab');
        const loginForm = document.getElementById('login-form');
        const signupForm = document.getElementById('signup-form');
        const message = document.getElementById('auth-message');
        const authModeText = document.getElementById('auth-mode-text');

        tabs.forEach(tab => {
            tab.addEventListener('click', () => {
                tabs.forEach(t => t.classList.remove('active'));
                tab.classList.add('active');

                const authBg = document.getElementById('auth-bg');

                if (tab.dataset.tab === 'login') {
                    loginForm.classList.remove('hidden');
                    signupForm.classList.add('hidden');
                    authModeText.textContent = 'LOGIN';
                    authBg.classList.remove('show-signup');
                } else {
                    loginForm.classList.add('hidden');
                    signupForm.classList.remove('hidden');
                    authModeText.textContent = 'REGISTER';
                    authBg.classList.add('show-signup');
                }

                message.className = 'auth-message';
                message.textContent = '';
            });
        });

        // Show message helper
        function showMessage(text, type) {
            message.textContent = text;
            message.className = `auth-message ${type}`;
        }

        // Login form handler
        loginForm.addEventListener('submit', async (e) => {
            e.preventDefault();

            const email = document.getElementById('login-email').value;
            const password = document.getElementById('login-password').value;
            const submitBtn = loginForm.querySelector('.auth-submit');

            const authExtras = [
                document.querySelector('.auth-tabs'),
                document.querySelector('.auth-divider'),
                document.querySelector('.auth-guest-btn'),
                document.querySelector('.auth-mode-bar')
            ];

            submitBtn.disabled = true;
            submitBtn.textContent = 'LOGGING IN...';
            loginForm.classList.add('hidden');
            authExtras.forEach(el => el.classList.add('hidden'));
            document.getElementById('auth-message').textContent = '';
            const authLoader = document.getElementById('auth-loader');
            authLoader.classList.remove('hidden');
            authLoader.querySelector('.s97-progress__label').textContent = 'LOGGING IN';
            startS97Progress(authLoader);

            const result = await signIn(email, password);

            document.getElementById('auth-loader').classList.add('hidden');

            if (result.success) {
                showMessage(result.message, 'success');
                setTimeout(() => {
                    window.location.href = 'index.html';
                }, 1500);
            } else {
                authExtras.forEach(el => el.classList.remove('hidden'));
                loginForm.classList.remove('hidden');
                submitBtn.disabled = false;
                submitBtn.textContent = 'LOG IN';
                showMessage(result.error, 'error');
            }
        });

        // Signup form handler
        signupForm.addEventListener('submit', async (e) => {
            e.preventDefault();

            const email = document.getElementById('signup-email').value;
            const password = document.getElementById('signup-password').value;
            const confirm = document.getElementById('signup-confirm').value;
            const submitBtn = signupForm.querySelector('.auth-submit');

            // Validate password length
            if (password.length < 12) {
                showMessage('Password must be at least 12 characters', 'error');
                return;
            }

            // Validate passwords match
            if (password !== confirm) {
                showMessage("Passwords don't match — try again", 'error');
                return;
            }

            const signupExtras = [
                document.querySelector('.auth-tabs'),
                document.querySelector('.auth-divider'),
                document.querySelector('.auth-guest-btn'),
                document.querySelector('.auth-mode-bar'),
                message
            ];

            submitBtn.disabled = true;
            submitBtn.textContent = 'CREATING ACCOUNT...';
            signupForm.classList.add('hidden');
            signupExtras.forEach(el => el.classList.add('hidden'));
            const authLoader2 = document.getElementById('auth-loader');
            authLoader2.classList.remove('hidden');
            authLoader2.querySelector('.s97-progress__label').textContent = 'CREATING ACCOUNT';
            startS97Progress(authLoader2);

            const result = await signUp(email, password);

            document.getElementById('auth-loader').classList.add('hidden');
            signupExtras.forEach(el => el.classList.remove('hidden'));

            if (result.success) {
                if (result.needsConfirmation) {
                    // Email confirmation required — don't switch to login yet
                    showMessage(result.message, 'success');
                    submitBtn.textContent = 'CHECK YOUR EMAIL';
                    signupForm.classList.remove('hidden');
                    signupForm.reset();
                    submitBtn.disabled = false;
                } else {
                    // No confirmation needed — switch to login
                    showMessage(result.message + ' Switching to login...', 'success');
                    submitBtn.textContent = 'ACCOUNT CREATED';

                    setTimeout(() => {
                        tabs.forEach(t => t.classList.remove('active'));
                        document.querySelector('[data-tab="login"]').classList.add('active');
                        loginForm.classList.remove('hidden');
                        authModeText.textContent = 'LOGIN';

                        document.getElementById('login-email').value = email;
                        document.getElementById('login-password').focus();

                        showMessage('Account created! Log in to get started.', 'success');

                        signupForm.reset();
                        submitBtn.disabled = false;
                        submitBtn.textContent = 'CREATE ACCOUNT';
                    }, 2000);
                }
            } else {
                showMessage(result.error, 'error');
                submitBtn.disabled = false;
                submitBtn.textContent = 'CREATE ACCOUNT';
                signupForm.classList.remove('hidden');
            }
        });
    </script>
</body>
</html>
