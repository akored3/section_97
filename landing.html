        @font-face { font-family: 'Chakra Petch'; src: url('fonts/chakra-petch-400.woff2') format('woff2'); font-weight: 400; font-style: normal; font-display: block; }
        @font-face { font-family: 'Chakra Petch'; src: url('fonts/chakra-petch-600.woff2') format('woff2'); font-weight: 600; font-style: normal; font-display: block; }

        @font-face { font-family: 'Barlow Condensed'; src: url('fonts/barlow-condensed-400.woff2') format('woff2'); font-weight: 400; font-style: normal; font-display: block; }
        @font-face { font-family: 'Barlow Condensed'; src: url('fonts/barlow-condensed-500.woff2') format('woff2'); font-weight: 500; font-style: normal; font-display: block; }
        @font-face { font-family: 'Barlow Condensed'; src: url('fonts/barlow-condensed-600.woff2') format('woff2'); font-weight: 600; font-style: normal; font-display: block; }
        @font-face { font-family: 'Barlow Condensed'; src: url('fonts/barlow-condensed-700.woff2') format('woff2'); font-weight: 700; font-style: normal; font-display: block; }
        @font-face { font-family: 'Space Mono'; src: url('fonts/space-mono-400.woff2') format('woff2'); font-weight: 400; font-style: normal; font-display: block; }
        @font-face { font-family: 'Space Mono'; src: url('fonts/space-mono-700.woff2') format('woff2'); font-weight: 700; font-style: normal; font-display: block; }

        /* ── Reset ── */
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        html { scroll-behavior: smooth; }

        /* ── Tokens (scoped to this page — does not collide with style.css) ── */
        :root {
            --lp-accent: #00ff64;
            --lp-accent-dim: #009940;
            --lp-accent-bright: #33ff85;
            --lp-bg: #06060a;
            --lp-bg2: #0a0a10;
            --lp-fg1: #f0f0f0;
            --lp-fg2: #888888;
            --lp-fg3: #444444;
            --lp-gold: #ffd700;
            --lp-error: #ff4444;
            --lp-font-display: 'Chakra Petch', 'Orbitron', sans-serif;
            --lp-font-body: 'Barlow Condensed', 'Rajdhani', sans-serif;
            --lp-font-mono: 'Space Mono', 'Share Tech Mono', monospace;
        }

        body {
            background: var(--lp-bg);
            color: var(--lp-fg1);
            font-family: var(--lp-font-body);
            overflow-x: hidden;
            min-height: 100vh;
        }

        /* ── Film grain (global overlay) ── */
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            pointer-events: none;
            z-index: 9999;
            opacity: 0.04;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
        }

        /* ── Scanlines (global overlay) ── */
        body::after {
            content: '';
            position: fixed;
            inset: 0;
            pointer-events: none;
            z-index: 9998;
            background: repeating-linear-gradient(0deg, transparent 0px, transparent 3px, rgba(0,255,100,0.015) 4px, transparent 5px);
        }

        /* ── Animations ── */
        @keyframes lp-blink { 0%, 49% { opacity: 1; } 50%, 100% { opacity: 0; } }

        /* ── Scroll reveal (used by sections we'll add later) ── */
        .reveal { opacity: 0; transform: translateY(40px); transition: opacity .7s cubic-bezier(0.2, 0, 0, 1), transform .7s cubic-bezier(0.2, 0, 0, 1); }
        .reveal.from-left { transform: translateX(-40px); }
        .reveal.from-right { transform: translateX(40px); }
        .reveal.visible { opacity: 1 !important; transform: none !important; }

        /* ── NAV ── */
        .lp-nav {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 200;
            background: rgba(4, 4, 8, 0.9);
            backdrop-filter: blur(20px) saturate(1.5);
            -webkit-backdrop-filter: blur(20px) saturate(1.5);
            border-bottom: 1px solid rgba(0, 255, 100, 0.2);
            height: 60px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 48px;
        }

        .lp-nav-logo {
            font-family: var(--lp-font-display);
            font-weight: 700;
            font-size: 18px;
            letter-spacing: 3px;
            color: #fff;
            text-decoration: none;
            text-transform: uppercase;
        }
        .lp-nav-logo .acc { color: var(--lp-accent); }
        .lp-nav-logo .cur { color: var(--lp-accent); animation: lp-blink 1s infinite; }

        .lp-nav-links { display: flex; gap: 4px; }
        .lp-nav-link {
            font-family: var(--lp-font-mono);
            font-size: 10px;
            letter-spacing: 2px;
            color: var(--lp-fg2);
            text-decoration: none;
            text-transform: uppercase;
            padding: 7px 14px;
            border: 1px solid transparent;
            transition: color 120ms, background 120ms, border-color 120ms;
        }
        .lp-nav-link:hover,
        .lp-nav-link.active {
            color: var(--lp-accent);
            background: rgba(0, 255, 100, 0.08);
            border-color: rgba(0, 255, 100, 0.3);
        }

        .lp-nav-cta {

            color: #000;
            background: var(--lp-accent);
            padding: 9px 20px;
            text-decoration: none;

            clip-path: polygon(8px 0, 100% 0, calc(100% - 8px) 100%, 0 100%);

        .lp-nav-cta:hover { background: var(--lp-accent-bright); }

        /* ── Hamburger (mobile) ── */

        /* ── Reduced motion ── */
        @media (prefers-reduced-motion: reduce) {
            *, *::before, *::after {
                animation-duration: 0.01ms !important;
                animation-iteration-count: 1 !important;
                transition-duration: 0.01ms !important;
                scroll-behavior: auto !important;
            }
        }

    <script type="module">
        // Nav active state — IntersectionObserver toggles .active on link matching the visible section.
        // Keeps the nav in sync as the user scrolls. Threshold 0.4 = section must be ≥40% in view.
        const navLinks = document.querySelectorAll('.lp-nav-link');
        const sections = document.querySelectorAll('main section[id]');

        if (sections.length && navLinks.length) {
            const navObs = new IntersectionObserver((entries) => {
                entries.forEach((entry) => {
                    if (!entry.isIntersecting) return;
                    const id = entry.target.id;
                    navLinks.forEach((link) => {
                        link.classList.toggle('active', link.getAttribute('href') === '#' + id);
                    });
                });
            }, { threshold: 0.4 });
            sections.forEach((s) => navObs.observe(s));
        }

        // Scroll reveal for elements marked .reveal (sections added later will use this)
        const revealEls = document.querySelectorAll('.reveal');
        if (revealEls.length) {
            const revObs = new IntersectionObserver((entries) => {
                entries.forEach((entry) => {
                    if (entry.isIntersecting) {
                        entry.target.classList.add('visible');
                        revObs.unobserve(entry.target);
                    }
                });
            }, { threshold: 0.08, rootMargin: '0px 0px -50px 0px' });
            revealEls.forEach((el) => revObs.observe(el));
        }
    </script>
